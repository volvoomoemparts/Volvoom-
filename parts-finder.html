<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLVOOM Parts Finder</title>
<link rel="stylesheet" href="style.css">
<style>
/* ============================= */
/* PARTS FINDER PAGE STYLES (Scoped) */
/* ============================= */
#parts-finder-page {
  font-family: Arial, sans-serif;
  background-color: #f0f2f5;
  color: #333;
  text-align: center;
  padding: 20px;
}

#parts-finder-page .parts-finder-container {
  max-width: 700px;
  margin: 50px auto;
  background: #fff;
  padding: 35px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  text-align: left;
}

#parts-finder-page header {
  text-align: center;
  margin-bottom: 25px;
}

#parts-finder-page header h1 {
  font-size: 2rem;
  color: #003057;
  margin-bottom: 5px;
}

#parts-finder-page header p {
  color: #555;
  font-size: 1rem;
}

#parts-finder-page .back-link {
  display: block;
  margin-bottom: 25px;
  color: #003057;
  text-decoration: none;
  font-weight: bold;
}

#parts-finder-page .back-link:hover {
  text-decoration: underline;
}

#parts-finder-page label {
  font-weight: bold;
  margin-bottom: 6px;
  display: block;
}

#parts-finder-page select,
#parts-finder-page input[type="text"] {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 20px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 1rem;
  transition: 0.3s;
}

#parts-finder-page select:focus,
#parts-finder-page input[type="text"]:focus {
  border-color: #25D366;
  outline: none;
}

#parts-finder-page .whatsapp-btn {
  display: block;
  width: 100%;
  text-align: center;
  padding: 14px 0;
  background-color: #25D366;
  color: #fff;
  font-size: 1.2rem;
  font-weight: bold;
  text-decoration: none;
  border-radius: 8px;
  transition: 0.3s;
}

#parts-finder-page .whatsapp-btn:hover {
  background-color: #1ebe5d;
}

@media(max-width: 700px){
  #parts-finder-page .parts-finder-container {
    margin: 30px 15px;
    padding: 25px;
  }
}
</style>
</head>
<body id="parts-finder-page">

<div class="parts-finder-container">

  <header>
    <h1>VOLVOOM Parts Finder</h1>
    <p>Find the Volvo part you need instantly</p>
  </header>

  <a href="index.html" class="back-link">← Back to VOLVOOM</a>

  <label for="model">Select Volvo Model</label>
  <select id="model">
    <option value="">-- Select Model --</option>
    <option value="xc90">XC90</option>
    <option value="xc70">XC70</option>
    <option value="xc60">XC60</option>
    <option value="v70">V70</option>
    <option value="s60">S60</option>
  </select>

  <label for="year">Select Year</label>
  <select id="year">
    <option value="">-- Select Year --</option>
    <option value="2023">2023</option>
    <option value="2022">2022</option>
    <option value="2021">2021</option>
    <option value="2020">2020</option>
    <option value="2019">2019</option>
    <option value="2018">2018</option>
    <option value="2017">2017</option>
    <option value="2016">2016</option>
    <option value="2015">2015</option>
    <option value="2014">2014</option>
    <option value="2013">2013</option>
    <option value="2012">2012</option>
    <option value="2011">2011</option>
    <option value="2010">2010</option>
    <option value="2009">2009</option>
    <option value="2008">2008</option>
    <option value="2007">2007</option>
  </select>

  <label for="system">Select System / Part Category</label>
  <select id="system">
    <option value="">-- Select System --</option>
    <option value="engine">Engine</option>
    <option value="transmission">Transmission</option>
    <option value="brakes">Brakes</option>
    <option value="electrical">Electrical</option>
    <option value="interior">Interior</option>
    <option value="suspension">Suspension</option>
  </select>

  <label for="part">Enter the part you need</label>
  <input type="text" id="part" placeholder="Example: window switch">

  <a 
    id="whatsappButton" 
    class="whatsapp-btn" 
    href="#" 
    target="_blank"
  >Send WhatsApp Request</a>

</div>

<script>
const whatsappButton = document.getElementById("whatsappButton");

whatsappButton.addEventListener("click", function() {
  const model = document.getElementById("model").value;
  const year = document.getElementById("year").value;
  const system = document.getElementById("system").value;
  const part = document.getElementById("part").value;

  if(!model || !year || !system || !part){
    alert("Please fill all fields before sending a request.");
    return;
  }

  const message = `Hello VOLVOOM, I need a part.\nModel: ${model}\nYear: ${year}\nSystem: ${system}\nPart: ${part}`;
  const phone = "278070321942"; // replace with your WhatsApp number
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  whatsappButton.href = url;
});
</script>

</body>
</html>
