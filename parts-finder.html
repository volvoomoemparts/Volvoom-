<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLVOOM Parts Finder</title>

<link rel="stylesheet" href="style.css">

<style>
/* FORCE override global styles */
#parts-finder-page {
  text-align: left !important;
}

/* Center container properly */
#parts-finder-page .parts-finder-container {
  max-width: 700px;
  margin: 60px auto;
}

/* Fix header spacing */
#parts-finder-page header {
  text-align: center;
  margin-bottom: 30px;
}

/* Fix inputs spacing */
#parts-finder-page select,
#parts-finder-page input {
  display: block;
}
</style>

</head>

<body id="parts-finder-page">

<div class="parts-finder-container">

  <header>
    <h1>VOLVOOM Parts Finder</h1>
    <p>Find the Volvo part you need instantly</p>
  </header>

  <a href="index.html" class="back-link">← Back to VOLVOOM</a>

  <label for="model">Select Volvo Model</label>
  <select id="model">
    <option value="">-- Select Model --</option>
    <option value="xc90">XC90</option>
    <option value="xc70">XC70</option>
    <option value="xc60">XC60</option>
    <option value="v70">V70</option>
    <option value="s60">S60</option>
  </select>

  <label for="year">Select Year</label>
  <select id="year">
    <option value="">-- Select Year --</option>
    <!-- keep your years -->
  </select>

  <label for="system">Select System / Part Category</label>
  <select id="system">
    <option value="">-- Select System --</option>
    <option value="engine">Engine</option>
    <option value="transmission">Transmission</option>
    <option value="brakes">Brakes</option>
    <option value="electrical">Electrical</option>
    <option value="interior">Interior</option>
    <option value="suspension">Suspension</option>
  </select>

  <label for="part">Enter the part you need</label>
  <input type="text" id="part" placeholder="Example: window switch">

  <a id="whatsappButton" class="whatsapp-btn" href="#" target="_blank">
    Send WhatsApp Request
  </a>

</div>

<script>
const whatsappButton = document.getElementById("whatsappButton");

whatsappButton.addEventListener("click", function() {
  const model = document.getElementById("model").value;
  const year = document.getElementById("year").value;
  const system = document.getElementById("system").value;
  const part = document.getElementById("part").value;

  if(!model || !year || !system || !part){
    alert("Please fill all fields before sending a request.");
    return;
  }

  const message = `Hello VOLVOOM, I need a part.\nModel: ${model}\nYear: ${year}\nSystem: ${system}\nPart: ${part}`;
  const phone = "278070321942";
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  whatsappButton.href = url;
});
</script>

</body>
</html>
