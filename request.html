<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VOLVOOM | Volvo Parts Request</title>

<link rel="stylesheet" href="style.css">

<style>

.request-container{
max-width:500px;
margin:60px auto;
padding:30px;
background:white;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

.request-container h2{
text-align:center;
margin-bottom:20px;
}

.request-container input,
.request-container select,
.request-container textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

.request-container button{
width:100%;
padding:14px;
background:#003057;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="request-container">

<h2>Volvo Part Request</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="tel" id="phone" placeholder="Phone Number">

<select id="model">
<option value="">Select Volvo Model</option>
<option>XC90</option>
<option>XC70</option>
<option>XC60</option>
<option>S60</option>
<option>S80</option>
<option>C30</option>
<option>V40</option>
<option>V70</option>
</select>

<input type="text" id="year" placeholder="Vehicle Year">

<input type="text" id="part" placeholder="Part Needed">

<input type="text" id="vin" placeholder="VIN Number (optional)">

<textarea id="notes" placeholder="Additional details"></textarea>

<button onclick="sendRequest()">Send Request via WhatsApp</button>

</div>

<script>

function sendRequest(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let model=document.getElementById("model").value;
let year=document.getElementById("year").value;
let part=document.getElementById("part").value;
let vin=document.getElementById("vin").value;
let notes=document.getElementById("notes").value;

let message="VOLVO PART REQUEST%0A%0A"+
"Name: "+name+"%0A"+
"Phone: "+phone+"%0A"+
"Model: "+model+"%0A"+
"Year: "+year+"%0A"+
"Part: "+part+"%0A"+
"VIN: "+vin+"%0A"+
"Notes: "+notes;

let url="https://wa.me/27703219420?text="+message;

window.open(url,"_blank");

}

</script>

<a href="https://wa.me/27703219420?text=Hello%20VOLVOOM,%20I%20need%20help%20finding%20a%20Volvo%20part."
class="whatsapp-btn"
target="_blank">

💬 Request Part

</a>

</nav>

</header>

</body>
</html>
