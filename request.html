<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>VOLVOOM | Request a Volvo Part</title>

<style>

body{
font-family:Arial;
background:#eef2f5;
margin:0;
text-align:center;
}

h1{
margin-top:40px;
color:#003057;
}

form{
max-width:500px;
margin:40px auto;
display:flex;
flex-direction:column;
gap:15px;
padding:20px;
}

input, select, textarea{
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#003057;
color:white;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00509e;
}

</style>

</head>

<body>

<h1>Request a Volvo Part</h1>

<form>

<input type="text" placeholder="Your Name">

<input type="tel" placeholder="Phone Number">

<select>
<option>Select Volvo Model</option>
<option>XC90</option>
<option>XC60</option>
<option>XC70</option>
<option>S80</option>
<option>S60</option>
<option>S40</option>
<option>V70</option>
<option>V40</option>
<option>C30</option>
<option>850</option>
</select>

<input type="text" placeholder="Vehicle Year">

<textarea placeholder="Part you are looking for"></textarea>

<button type="submit">Submit Request</button>

</form>

</body>
</html>
