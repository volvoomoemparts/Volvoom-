<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volvo XC60 Turbo Parts</title>
<link rel="stylesheet" href="style.css">
<style>
body{font-family:Arial;background:#f4f7fa;margin:0;text-align:center;}
h1{margin-top:40px;}
.parts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:30px;max-width:900px;margin:auto;}
.part-card{background:white;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);cursor:pointer;}
.part-card img{width:100%;border-radius:6px;}
.part-card p{margin-top:10px;font-weight:bold;}
</style>
</head><body><h1>Volvo XC60 Turbo Parts</h1><div class="parts-grid"><div class="part-card" onclick="requestPart('XC60','2009-2017','Turbocharger')">
<img src="images/turbo.jpg"><p>Turbocharger</p></div><div class="part-card" onclick="requestPart('XC60','2009-2017','Wastegate')">
<img src="images/wastegate.jpg"><p>Wastegate</p></div><div class="part-card" onclick="requestPart('XC60','2009-2017','Intercooler')">
<img src="images/intercooler.jpg"><p>Intercooler</p></div><div class="part-card" onclick="requestPart('XC60','2009-2017','Boost Control Valve')">
<img src="images/boost-valve.jpg"><p>Boost Control Valve</p></div><div class="part-card" onclick="requestPart('XC60','2009-2017','Turbo Oil Line')">
<img src="images/turbo-oil-line.jpg"><p>Turbo Oil Line</p></div></div><script>
function requestPart(model,year,part){
let phone="27703219420";
let message="Hello VOLVOOM,%0A%0AModel: "+model+"%0AYear: "+year+"%0APart: "+part;
window.open("https://wa.me/"+phone+"?text="+message,"_blank");
}
</script></body>
</html>
