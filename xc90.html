<!DOCTYPE html>
<html>

<head>

<title>VOLVOOM | Volvo XC90 Parts</title>

<style>

body{
font-family:Arial;
background:#f4f7fa;
padding:30px;
margin:0;
}

h1{
text-align:center;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
max-width:1000px;
margin:auto;
}

.part{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
text-align:center;
}

.part img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

.part p{
font-weight:bold;
margin:0;
}

</style>

</head>

<body>

<h1>Volvo XC90 Parts Catalog</h1>

<div class="gallery">

<div class="part">
<img src="images/engine.jpg">
<p>Engine</p>
</div>

<div class="part">
<img src="images/turbo.jpg">
<p>Turbo</p>
</div>

<div class="part">
<img src="images/transmission.jpg">
<p>Transmission</p>
</div>

<div class="part">
<img src="images/suspension.jpg">
<p>Suspension</p>
</div>

<div class="part">
<img src="images/interior.jpg">
<p>Interior</p>
</div>

</div>

</body>

</html>
